name: Kodix Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  security:
    name: 🛡️ Kodix AI Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Kodix Security Scan
        uses: kodix-security/kodix-action@v1
        with:
          api_key: ${{ secrets.KODIX_API_KEY }}
